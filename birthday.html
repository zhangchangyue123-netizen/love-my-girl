<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="css/birthday.css">

</head>

<body>

<!-- =========================
黑暗蜡烛开场（第一层）
========================= -->

<div id="intro" class="intro">

    <div class="intro-content">

        <div class="intro-text">

            轻触屏幕

        </div>

        <div class="single-candle">

            <div class="flame"></div>

            <div class="candle"></div>

        </div>

    </div>

</div>

<!-- 星空 -->

<canvas id="birthdayStars"></canvas>

<!-- 飘花 -->

<div id="petals"></div>

<!-- =========================
生日主体
========================= -->

<div class="birthday-container">

    <!-- 日期 -->

    <div class="birthday-date">

        2026 · 08 · 20

    </div>

    <!-- 标题 -->

    <h1 class="birthday-title">

        Happy Birthday

    </h1>

    <!-- 名字 -->

    <h2 class="birthday-name">

        宝宝 ❤️

    </h2>

    <!-- 蛋糕 -->

    <div class="cake-section">

        <div class="cake-light"></div>

        <img
            src="images/cake.png"
            class="cake"
            alt="Birthday Cake">

    </div>

    <!-- 毛玻璃祝福 -->

    <div class="wish-card">

        <p id="wish">

            宝宝，生日快乐 ❤️

            <br><br>

            今天是属于你的特别日子。

            <br>

            希望你的笑容永远像今天一样灿烂。

            <br><br>

            遇见你，

            是我最幸运的一件事。

            <br><br>

            ❤️

        </p>

    </div>

    <!-- 按钮 -->

    <div class="button-group">

        <button id="wishBtn">

            🎁 收下生日惊喜

        </button>

        <button id="nextBtn">

            📷 进入我们的回忆

        </button>

    </div>

</div>

<!-- 音乐按钮 -->

<div id="musicBtn" class="music-btn">

    🎵

</div>

<!-- 背景音乐 -->

<audio
    id="birthdayMusic"
    loop>

    <source src="music/happy-birthday.mp3" type="audio/mpeg">

</audio>

<!-- JS -->

<script src="js/birthday.js"></script>

</body>

</html>
