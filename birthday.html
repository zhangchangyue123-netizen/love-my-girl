<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Happy Birthday · 宝宝 ❤️</title>


<link rel="stylesheet" href="css/birthday.css">


</head>


<body>


<canvas id="birthdayStars"></canvas>



<div class="birthday-container">



<div class="love-date">
8.20
</div>




<h1 class="title">
Happy Birthday
</h1>



<div class="sub-title">
To My Love ❤️
</div>



<h2 class="name">
宝宝
</h2>





<!-- 粉色草莓千层蛋糕 -->

<div class="cake-area">


<svg class="pink-cake"
viewBox="0 0 400 320">


<!-- 阴影 -->

<ellipse
cx="200"
cy="280"
rx="120"
ry="25"
class="cake-shadow"/>



<!-- 蛋糕主体 -->

<path
d="
M80 190
Q200 240 320 190
L300 255
Q200 290 100 255
Z"
class="pink-body"/>





<!-- 千层奶油 -->

<path
d="
M95 180
Q200 215 305 180"
class="cream-line"/>


<path
d="
M100 150
Q200 190 300 150"
class="cream-line"/>


<path
d="
M105 120
Q200 165 295 120"
class="cream-line"/>





<!-- 顶部奶油 -->

<ellipse
cx="200"
cy="110"
rx="105"
ry="35"
class="pink-top"/>





<!-- 奶油纹路 -->

<path
d="
M110 110
Q140 140 170 110
Q200 140 230 110
Q260 140 290 110"
class="cream-wave"/>






<!-- 草莓 -->

<circle
cx="140"
cy="75"
r="22"
class="berry"/>


<circle
cx="200"
cy="65"
r="25"
class="berry"/>


<circle
cx="260"
cy="75"
r="22"
class="berry"/>





<!-- 珍珠装饰 -->


<circle
cx="130"
cy="130"
r="5"
class="pearl"/>


<circle
cx="160"
cy="145"
r="5"
class="pearl"/>


<circle
cx="240"
cy="145"
r="5"
class="pearl"/>


<circle
cx="270"
cy="130"
r="5"
class="pearl"/>





<!-- 蜡烛 -->


<rect
x="195"
y="25"
width="10"
height="45"
rx="5"
class="gold-candle"/>





<!-- 火焰 -->


<path
d="
M200 15
C180 40
205 55
215 30
C215 20
205 10
200 15"
class="pink-fire"/>



</svg>



<div class="pink-glow"></div>


</div>






<!-- 祝福 -->

<div class="love-card">

<p id="wish"></p>

</div>





<button id="wishBtn">

🕯️ 点亮生日愿望

</button>




<button id="nextBtn">

进入我们的回忆 ❤️

</button>




</div>





<audio id="birthdayMusic" loop>


<source src="music/happy-birthday.mp3"
type="audio/mpeg">


</audio>





<script src="js/birthday.js"></script>


</body>


</html>
