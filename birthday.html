<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday · 袁雨婷 ❤️</title>


<link rel="stylesheet" href="css/birthday.css">

</head>


<body>


<!-- 星空背景 -->

<canvas id="birthdayStars"></canvas>



<div class="birthday-container">


    <!-- 日期 -->

    <div class="date">

        8.20

    </div>



    <!-- 标题 -->

    <h1 class="title">

        Happy Birthday

    </h1>



    <!-- 名字 -->

    <h2 class="name">

        袁雨婷 ❤️

    </h2>




    <!-- 蛋糕 -->

    <div class="cake-area">


        <div class="flame" id="flame">

            🔥

        </div>



        <div class="cake">


            <div class="cake-top">

            </div>


            <div class="cake-body">

            </div>


            <div class="cake-bottom">

            </div>


        </div>



    </div>





    <!-- 祝福 -->

    <div class="message">


        <p id="wish"></p>


    </div>






    <!-- 按钮 -->


    <button id="wishBtn">


        🕯️ 许下生日愿望


    </button>



    <button id="nextBtn">


        进入我们的回忆 →


    </button>



</div>





<!-- 音乐 -->

<audio id="birthdayMusic" loop>


    <source src="assets/music/happy-birthday.mp3">


</audio>



<script src="js/birthday.js"></script>


</body>


</html>
