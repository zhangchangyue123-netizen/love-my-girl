<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <meta name="theme-color" content="#000000">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style"
          content="black-translucent">

    <title>
        Happy Birthday · 宝宝 ❤️
    </title>


    <link rel="stylesheet" href="css/style.css">

</head>


<body>


    <!-- 星空背景 -->

    <canvas id="stars"></canvas>


    <!-- 背景柔光 -->

    <div class="glow glow1"></div>

    <div class="glow glow2"></div>



    <!-- 流星 -->

    <div class="meteor meteor1"></div>

    <div class="meteor meteor2"></div>



    <!-- 首页内容 -->

    <main id="intro">


        <section class="content">



            <!-- 英文标题 -->

            <p class="small fade-item">

                To My Baby

            </p>




            <!-- 主标题 -->

            <h1 class="title fade-item">

                今晚的星空，

            </h1>




            <!-- 副标题 -->

            <h2 class="subtitle fade-item">


                藏着属于你的一份小幸运。


            </h2>




            <!-- 分割线 -->

            <div class="line fade-item"></div>




            <!-- 小文字 -->

            <p class="tip fade-item">

                愿今天的你，

                收到一份特别的惊喜。

            </p>




            <!-- 开始按钮 -->

            <button

                id="openBtn"

                class="fade-item">


                ✨ 打开看看


            </button>



        </section>



    </main>




    <!-- 粒子层 -->

    <div id="particleLayer"></div>




    <!-- 转场黑幕 -->

    <div id="fade"></div>




    <!-- 背景音乐 -->

    <audio

        id="bgm"

        preload="auto"

        loop>


        <source

            src="assets/music/happy-birthday.mp3"

            type="audio/mpeg">


    </audio>




    <script src="js/main.js"></script>



</body>


</html>
