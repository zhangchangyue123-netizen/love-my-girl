<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <meta name="theme-color" content="#000000">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style"
          content="black-translucent">

    <title>Happy Birthday · 宝宝 ❤️</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- 星空背景 -->
    <canvas id="stars"></canvas>

    <!-- 柔光 -->
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- 流星 -->
    <div class="meteor meteor1"></div>
    <div class="meteor meteor2"></div>

    <!-- 页面主体 -->

    <main id="intro">

        <section class="content">

            <!-- 第一行 -->

            <p class="small fade-item">

                To My Baby

            </p>

            <!-- 第二行 -->

            <h1 class="title fade-item">

                今晚的星空，

            </h1>

            <!-- 第三行 -->

            <h2 class="subtitle fade-item">

                藏着一份<br>

                只属于你的惊喜。

            </h2>

            <!-- 分割线 -->

            <div class="line fade-item"></div>

            <!-- 提示 -->

            <p class="tip fade-item">

                戴上耳机，

                找一个安静的地方，

                然后慢慢开始今晚的故事。

            </p>

            <!-- 按钮 -->

            <button
                id="openBtn"
                class="fade-item">

                ✨ 去看看 ❤️

            </button>

        </section>

    </main>

    <!-- 星空粒子容器 -->

    <div id="particleLayer"></div>

    <!-- 转场 -->

    <div id="fade"></div>

    <!-- 背景音乐 -->

    <audio
        id="bgm"
        preload="auto"
        loop>

        <source
            src="assets/music/happy-birthday.mp3"
            type="audio/mpeg">

    </audio>

    <!-- JS -->

    <script src="js/main.js"></script>

</body>

</html>
